<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Focus Search screenshot</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1280px;
        height: 800px;
        overflow: hidden;
        background: #0f0f0f;
        color: #f1f1f1;
        font-family: Roboto, Arial, sans-serif;
      }

      .masthead {
        position: absolute;
        inset: 0 0 auto;
        height: 64px;
        display: flex;
        align-items: center;
        padding: 0 28px;
        border-bottom: 1px solid #202020;
        opacity: 0.34;
      }

      .menu {
        width: 18px;
        height: 14px;
        display: grid;
        gap: 4px;
      }

      .menu span {
        display: block;
        height: 2px;
        background: #f1f1f1;
        border-radius: 2px;
      }

      .screen {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
      }

      .panel {
        width: min(860px, 100%);
        display: grid;
        gap: 30px;
        justify-items: center;
        transform: translateY(-6vh);
      }

      .identity {
        display: grid;
        justify-items: center;
        gap: 12px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 38px;
        line-height: 1;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #aaa;
        font-size: 15px;
        line-height: 1.35;
      }

      form {
        width: 100%;
        min-height: 58px;
        display: flex;
        align-items: center;
        border: 1px solid #303030;
        border-radius: 29px;
        background: #121212;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
        overflow: hidden;
      }

      .search-icon {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        color: #aaa;
      }

      .search-icon svg,
      button svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      input {
        flex: 1;
        height: 58px;
        border: 0;
        padding: 0 18px 0 0;
        background: transparent;
        color: #f1f1f1;
        font: inherit;
        font-size: 20px;
        outline: 0;
      }

      button {
        width: 86px;
        height: 58px;
        display: grid;
        place-items: center;
        border: 0;
        border-left: 1px solid #303030;
        background: #222;
        color: #f1f1f1;
      }
    </style>
  </head>
  <body>
    <div class="masthead" aria-hidden="true">
      <div class="menu"><span></span><span></span><span></span></div>
    </div>
    <main class="screen">
      <section class="panel">
        <header class="identity">
          <h1>Focus Search</h1>
          <p>Search youtube.com</p>
        </header>
        <form>
          <span class="search-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-4.4-4.4"></path>
            </svg>
          </span>
          <input value="" placeholder="Search">
          <button type="button" aria-label="Search">
            <svg viewBox="0 0 24 24">
              <path d="M5 12h14"></path>
              <path d="m13 6 6 6-6 6"></path>
            </svg>
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
