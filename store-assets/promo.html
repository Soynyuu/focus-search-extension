<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Focus Search promo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 440px;
        height: 280px;
        overflow: hidden;
        background: #0f0f0f;
        color: #f1f1f1;
        font-family: Roboto, Arial, sans-serif;
      }

      .wrap {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .content {
        width: 100%;
        display: grid;
        gap: 20px;
        justify-items: center;
      }

      .mark {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        background: #065fd4;
        box-shadow: 0 14px 34px rgba(6, 95, 212, 0.28);
      }

      svg {
        width: 30px;
        height: 30px;
        stroke: #fff;
        stroke-width: 2.2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1;
        font-weight: 650;
        letter-spacing: 0;
      }

      .search {
        width: 100%;
        height: 44px;
        display: flex;
        align-items: center;
        border: 1px solid #303030;
        border-radius: 22px;
        background: #121212;
        color: #aaa;
        padding: 0 16px;
        font-size: 15px;
      }

      .dot {
        width: 7px;
        height: 7px;
        margin-left: auto;
        border-radius: 999px;
        background: #3ea6ff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="content">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-4.4-4.4"></path>
          </svg>
        </div>
        <h1>Focus Search</h1>
        <div class="search">Search youtube.com <span class="dot"></span></div>
      </section>
    </main>
  </body>
</html>
